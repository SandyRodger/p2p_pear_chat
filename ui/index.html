<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>P2P Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      --title-bar-height: 42px;
      padding-top: var(--title-bar-height);
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: sans-serif;
      display: flex;
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
    }

    #bar {
      background: rgba(55, 60, 72, 0.6);
      backdrop-filter: blur(64px);
      -webkit-app-region: drag;
      height: var(--title-bar-height);
      position: fixed;
      width: 100%;
      top: 0; left: 0;
      border-radius: 8px 8px 0 0;
      z-index: 2;
    }

    /* CANVAS PANEL */
    #canvas-panel {
      flex: 65;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
      overflow: hidden;
    }

    #toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #333;
      align-items:center;
      -webkit-app-region: no-drag;
    }

    #toolbar button {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a3e;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 0.85rem;
    }

    #toolbar button.active {
      background: #2d6a4f;
      border-color: #2d6a4f;
    }

    #toolbar input[type="color"] {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: none;
      padding: 0;
    }

    #toolbar input[type="range"] {
      width: 80px;
    }

    #toolbar .seperator {
      width: 1px;
      height: 24px;
      background: #444;
      margin: 0 4px;
    }

    canvas {
      flex: 1;
      cursor: crosshair;
      display: block;
      background: white;
    }

    /* CHAT PANEL */
    #chat-panel {
      flex: 35;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topic {
      font-size: 0.7rem;
      color: #888;
      padding: 8px 12px;
      word-break: break-all;
      border-bottom: 1px solid #333;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      padding: 8px 12px;
      border-radius: 8px;
      background: #2a2a3e;
      max-width: 90%;
      word-break: break-word;
    }

    .message.mine {
      background: #1a472a;
      align-self: flex-end;
    }
    .message .sender {
      font-size: 0.7rem;
      color: #888;
      margin-bottom: 4px;
    }
    #input-area {
      display: flex;
      padding: 12px;
      gap: 8px;
      border-top: 1px solid #333;
    }
    #input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2a2a3e;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
    }
    #send {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #2d6a4f;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }
    #send:hover { background: #40916c; }
    
    /* JOIN SCREEN */
    #join-screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
      z-index: 10;
    }
    #join-screen h2 { font-size: 2rem; color: #e0e0e0; }
    #join-screen p { color: #888; }

    #join-screen input {
      width: 100%;
      max-width: 500px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2a2a3e;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
    }
    #join-screen button {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: #2d6a4f;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      min-width: 200px;
    }
    #join-screen button:hover {
      background: #40916c;
    }
  </style>
</head>
<body>
  <div id="bar"><pear-ctrl></pear-ctrl></div>
  <div id="join-screen">
    <h2>P2P Chat</h2>
    <p>Enter a room name to get started</p>
    <input id="room-input" type="text" placeholder="Enter room name..." />
    <button id="join-btn">Join Room</button>
  </div>

  <!-- CANVAS PANEL -->
  <div id="canvas-panel">
    <div id="toolbar">
      <button id="tool-pen" class="active">Pen</button>
      <button id="tool-line">Line</button>
      <button id="tool-rect">Rectangle</button>
      <button id="tool-circle">Circle</button>
      <div class="seperator"></div>
      <input type="color" id="color-picker" value="#e0e0e0" title="Colour">
      <input type="range" id="stroke-width" min="1" max="20" value="3" title="stroke width">
      <div class="seperator"></div>
      <button id="tool-clear">Clear</button>
    </div>
    <canvas id="canvas" willreadfrequently="true"></canvas>
  </div>

  <!-- CHAT PANEL -->
  <div id="chat-panel">
    <div id="topic">Room: <span id="topic-key">-</span></div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="input" type="text" placeholder="Type a message..." />
      <button id="send">Send</button>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
