<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>P2P Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      --title-bar-height: 42px;
      padding-top: var(--title-bar-height);
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: sans-serif;
      display: flex;
      flex-direction:column;
      height: 100vh;
    }

    #bar {
      background: rgba(55, 60, 72, 0.6);
      backdrop-filter: blur(64px);
      -webkit-app-region: drag;
      height: var(--title-bar-height);
      position: fixed;
      width: 100%;
      top: 0; left: 0;
      border-radius: 8px 8px 0 0;
      z-index: 2;
    }
    #topic {
      font-size: 0.7rem;
      color: #888;
      padding: 8px 12px;
      word-break: break-all;
      border-bottom: 1px solid #333;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .message {
      padding: 8px 12px;
      border-radius: 8px;
      background: #2a2a3e;
      max-width: 80%;
      word-break: break-word;
    }
    .message.mine {
      background: #1a472a;
      align-self: flex-end;
    }
    .message .sender {
      font-size: 0.7rem;
      color: #888;
      margin-bottom: 4px;
    }
    #input-area {
      display: flex;
      padding: 12px;
      gap: 8px;
      border-top: 1px solid #333;
    }
    #input {
      flex: 1;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2a2a3e;
      color: #e0e0e0;
      font-size: 1rem;
      outline: none;
    }
    #send {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #2d6a4f;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }
    #send:hover { background: #40916c; }
    #join-screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 40px;
      z-index: 10;
    }
    #join-screen h2 { font-size: 2rem; color: #e0e0e0; }
    #join-screen p { color: #888; }
    #join-screen hr {width: 100%; border-color: #333; }
    #join-screen input {
      width: 100%;
      max-width: 500px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2a2a3e;
      color: #e0e0e0;
      font-size: 1rem;
    }
    #join-screen button {
      padding: 10px 24px;
      border-radius: 8px;
      border: none;
      background: #2d6a4f;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      min-width: 200px;
    }
    #join-screen button:hover {
      background: #40916c;
    }
    </style>
</head>
<body>
  <div id="bar"><pear-ctrl></pear-ctrl></div>
  <div id="topic">Topic: <span id="topic-key">waiting...</span></div>
  <div id="join-screen">
    <h2>P2P Chat</h2>
    <p>Create a new room or join an existing one</p>
    <button id="create-btn">Create New Room</button>
    <hr>
    <p>Or join an existing room:</p>
    <input id="join-input" type="text" placeholder="Paste topic key here..."/>
    <button id="join-btn">Join Room</button>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <input id="input" type="text" placeholder="Type a message..." />
    <button id="send">Send</button>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
